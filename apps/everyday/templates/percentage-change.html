<div class="tool-header">
  <h2>Percentage Change</h2>
  <p>Calculate the percentage increase or decrease between two numbers.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="pc-old">Old Value</label>
        <input type="number" id="pc-old" placeholder="e.g. 50">
      </div>
      <div class="input-group">
        <label for="pc-new">New Value</label>
        <input type="number" id="pc-new" placeholder="e.g. 75">
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric">
      <span id="pc-label">Change</span>
      <strong id="pc-result">0%</strong>
    </div>
  </section>
</div>
