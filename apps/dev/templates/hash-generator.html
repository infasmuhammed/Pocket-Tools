<div class="tool-header">
      <h2>Hash Generator</h2>
      <p>SHA hashes with Web Crypto. Everything runs locally in this browser.</p>
    </div>
    <div class="tool-dashboard">
    <div class="tool-layout">
      <div class="tool-stack">
        
    <div class="panel">
      <div class="panel-title">
        <div>
          <h3>Hash source</h3>
          
        </div>
      </div>
      
          
    <div class="field">
      <label for="hash-input">Text</label>
      <textarea id="hash-input" class="textarea" rows="8" spellcheck="false">Pocket Dev</textarea>
    </div>
  
          <div class="field"><label for="hash-file">Optional file</label><input id="hash-file" class="input" type="file"></div>
          <div class="action-row">
            <button id="hash-run" class="btn" type="button">Hash text</button>
            <button id="hash-file-run" class="btn-secondary" type="button">Hash file</button>
          </div>
        
    </div>
  
        <div id="hash-status" class="status-line"></div>
      </div>
      <div class="tool-stack">
        <div id="hash-cards"></div>
        
    <div class="field">
      <div class="row">
        <span class="mini-label">Output</span>
        <button class="btn-secondary" type="button" data-copy-target="#hash-output">Copy</button>
      </div>
      <pre id="hash-output" class="output"></pre>
    </div>
  
      </div>
    </div>
  </div>
