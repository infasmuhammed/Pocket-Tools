<div class="tool-header">
      <h2>Flutter Color Helper</h2>
      <p>Create Flutter, Android and iOS color code. Everything runs locally in this browser.</p>
    </div>
    <div class="tool-dashboard">
    <div class="tool-layout">
      <div class="tool-stack">
        
    <div class="panel">
      <div class="panel-title">
        <div>
          <h3>Color</h3>
          
        </div>
      </div>
      
          <div class="control-grid">
            <div class="field"><label for="fc-color">Color picker</label><input id="fc-color" class="input" type="color" value="#111111"></div>
            <div class="field"><label for="fc-hex">HEX</label><input id="fc-hex" class="input" value="#111111"></div>
            <div class="field"><label for="fc-alpha">Alpha</label><input id="fc-alpha" class="input" type="range" min="0" max="100" value="100"></div>
            <div class="field"><label for="fc-name">Resource name</label><input id="fc-name" class="input" value="brand"></div>
          </div>
        
    </div>
  
        <div id="fc-preview" class="color-hero"></div>
      </div>
      <div class="tool-stack">
        <div id="fc-cards"></div>
        
    <div class="field">
      <div class="row">
        <span class="mini-label">Code</span>
        <button class="btn-secondary" type="button" data-copy-target="#fc-output">Copy</button>
      </div>
      <pre id="fc-output" class="output"></pre>
    </div>
  
      </div>
    </div>
  </div>
