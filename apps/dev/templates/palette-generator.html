<div class="tool-header">
      <h2>Palette Generator</h2>
      <p>Generate UI palettes from a seed. Everything runs locally in this browser.</p>
    </div>
    <div class="tool-dashboard">
    <div class="tool-layout">
      <div class="tool-stack">
        
    <div class="panel">
      <div class="panel-title">
        <div>
          <h3>Palette controls</h3>
          
        </div>
      </div>
      
          <div class="control-grid">
            <div class="field"><label for="pg-color">Seed color</label><input id="pg-color" class="input" type="color" value="#111111"></div>
            <div class="field"><label for="pg-mode">Harmony</label><select id="pg-mode" class="select"><option value="analogous">Analogous</option><option value="triadic">Triadic</option><option value="mono">Monochrome</option><option value="complement">Complement</option><option value="split">Split complement</option></select></div>
            <div class="field"><label for="pg-count">Colors</label><input id="pg-count" class="input" type="number" min="3" max="12" value="6"></div>
            <div class="field"><label for="pg-saturation">Saturation</label><input id="pg-saturation" class="input" type="range" min="10" max="100" value="70"></div>
          </div>
          <div class="action-row">
            <button id="pg-random" class="btn-secondary" type="button">Random seed</button>
            <button id="pg-copy-css" class="btn-secondary" type="button">Copy CSS vars</button>
          </div>
        
    </div>
  
      </div>
      <div class="tool-stack">
        <div id="pg-swatches" class="swatch-grid"></div>
        
    <div class="field">
      <div class="row">
        <span class="mini-label">Palette</span>
        <button class="btn-secondary" type="button" data-copy-target="#pg-output">Copy</button>
      </div>
      <pre id="pg-output" class="output"></pre>
    </div>
  
      </div>
    </div>
  </div>
