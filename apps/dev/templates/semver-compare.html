<div class="tool-header">
      <h2>Semver Compare</h2>
      <p>Compare version numbers. Everything runs locally in this browser.</p>
    </div>
    <div class="tool-dashboard">
    <div class="tool-layout">
      <div class="tool-stack">
        
    <div class="panel">
      <div class="panel-title">
        <div>
          <h3>Versions</h3>
          
        </div>
      </div>
      
          <div class="control-grid">
            <div class="field"><label for="sv-a">Version A</label><input id="sv-a" class="input" value="1.2.3"></div>
            <div class="field"><label for="sv-b">Version B</label><input id="sv-b" class="input" value="1.3.0-beta.1"></div>
          </div>
        
    </div>
  
        <div id="sv-status" class="status-line"></div>
      </div>
      <div class="tool-stack">
        <div id="sv-cards"></div>
        
    <div class="field">
      <div class="row">
        <span class="mini-label">Result</span>
        <button class="btn-secondary" type="button" data-copy-target="#sv-output">Copy</button>
      </div>
      <pre id="sv-output" class="output"></pre>
    </div>
  
      </div>
    </div>
  </div>
