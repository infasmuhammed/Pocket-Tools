<div class="tool-header">
      <h2>HEX RGB HSL Converter</h2>
      <p>Convert colors both ways. Everything runs locally in this browser.</p>
    </div>
    <div class="tool-dashboard">
    <div class="tool-layout">
      <div class="tool-stack">
        
    <div class="panel">
      <div class="panel-title">
        <div>
          <h3>Color input</h3>
          
        </div>
      </div>
      
          <div class="field"><label for="cc-input">Color value</label><input id="cc-input" class="input" value="#111111" spellcheck="false"></div>
          <div class="field"><label for="cc-picker">Picker</label><input id="cc-picker" class="input" type="color" value="#111111"></div>
          <p class="pro-note">Accepts HEX, RGB and HSL. Outputs common app, CSS, Flutter, Android and iOS formats.</p>
        
    </div>
  
        <div id="cc-preview" class="color-hero"><strong>#111111</strong><span>rgb(17, 17, 17)</span></div>
      </div>
      <div class="tool-stack">
        <div id="cc-results"></div>
        
    <div class="field">
      <div class="row">
        <span class="mini-label">Copy all formats</span>
        <button class="btn-secondary" type="button" data-copy-target="#cc-output">Copy</button>
      </div>
      <pre id="cc-output" class="output"></pre>
    </div>
  
      </div>
    </div>
  </div>
