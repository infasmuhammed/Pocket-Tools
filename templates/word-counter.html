<div class="tool-header">
  <h2>Word & Character Counter</h2>
  <p>Instantly count words, characters, sentences, and paragraphs in your text.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="input-group">
      <label for="wc-input">Input Text</label>
      <textarea id="wc-input" placeholder="Type or paste your text here..."></textarea>
    </div>
    <div class="button-row">
      <button id="wc-clear" class="btn btn-secondary">Clear Text</button>
      <button id="wc-copy" class="btn">Copy Text</button>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Words</span>
        <strong id="wc-words">0</strong>
      </div>
      <div class="metric">
        <span>Characters</span>
        <strong id="wc-chars">0</strong>
      </div>
      <div class="metric">
        <span>Without Spaces</span>
        <strong id="wc-chars-no-spaces">0</strong>
      </div>
      <div class="metric">
        <span>Paragraphs</span>
        <strong id="wc-paragraphs">0</strong>
      </div>
    </div>
  </section>
</div>
