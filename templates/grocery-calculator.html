<div class="tool-header">
  <h2>Grocery List + Price Calculator</h2>
  <p>Create a simple grocery list with quantities, prices, and totals.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label>Item</label>
        <input type="text" id="gc-item" placeholder="Rice">
      </div>
      <div class="input-group">
        <label>Quantity</label>
        <input type="number" id="gc-qty" min="0" step="0.01" value="1">
      </div>
      <div class="input-group">
        <label>Price</label>
        <input type="number" id="gc-price" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="button-row">
      <button id="gc-add" class="btn">Add Item</button>
      <button id="gc-clear" class="btn btn-secondary">Clear List</button>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Items</span>
        <strong id="gc-count">0</strong>
      </div>
      <div class="metric">
        <span>Total</span>
        <strong id="gc-total">0.00</strong>
      </div>
    </div>
    <div id="gc-list" class="grocery-list"></div>
    <div class="button-row">
      <button id="gc-copy" class="btn btn-secondary">Copy List</button>
    </div>
  </section>
</div>
