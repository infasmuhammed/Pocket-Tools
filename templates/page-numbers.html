<div class="tool-header">
  <h2>Add Page Numbers</h2>
  <p>Add professional page numbering to a PDF.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="drop-zone">
      <input type="file" id="pn-upload" accept="application/pdf">
      <div>
        <strong>Select PDF</strong>
        <span>Configure numbering before adding it to the document.</span>
      </div>
    </div>
  </section>

  <section id="pn-controls" class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label>Position</label>
        <select id="pn-pos">
          <option value="bottom-center">Bottom Center</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="top-right">Top Right</option>
          <option value="top-center">Top Center</option>
          <option value="top-left">Top Left</option>
        </select>
      </div>
      <div class="input-group">
        <label>Number Style</label>
        <select id="pn-style">
          <option value="number">1, 2, 3</option>
          <option value="page-number">Page 1</option>
          <option value="page-of-total">Page 1 of 10</option>
          <option value="dash-number">- 1 -</option>
        </select>
      </div>
      <div class="input-group">
        <label>Start Number</label>
        <input type="number" id="pn-start" min="0" value="1">
      </div>
      <div class="input-group">
        <label>Font Size</label>
        <input type="number" id="pn-size" min="8" max="36" value="12">
      </div>
    </div>
    <button id="pn-generate" class="btn">Add Numbers</button>
  </section>
</div>
