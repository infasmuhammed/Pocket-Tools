<div class="tool-header">
  <h2>EMI Calculator</h2>
  <p>Calculate your monthly loan payments easily.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="emi-principal">Loan Amount</label>
        <input type="number" id="emi-principal" placeholder="e.g. 10000" min="0">
      </div>
      <div class="input-group">
        <label for="emi-rate">Interest Rate (Yearly %)</label>
        <input type="number" id="emi-rate" placeholder="e.g. 7.5" min="0" step="0.1">
      </div>
      <div class="input-group">
        <label>Tenure</label>
        <input type="number" id="emi-tenure" placeholder="e.g. 5" min="1">
      </div>
      <div class="input-group">
        <label>Tenure Type</label>
        <select id="emi-tenure-type">
          <option value="years">Years</option>
          <option value="months">Months</option>
        </select>
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Monthly EMI</span>
        <strong id="emi-monthly">0.00</strong>
      </div>
      <div class="metric">
        <span>Total Interest</span>
        <strong id="emi-total-interest">0.00</strong>
      </div>
      <div class="metric">
        <span>Total Payment</span>
        <strong id="emi-total-payment">0.00</strong>
      </div>
    </div>
  </section>
</div>
