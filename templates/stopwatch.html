<div class="tool-header">
  <h2>Stopwatch</h2>
  <p>A simple, precise stopwatch with lap functionality.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel timer-panel">
    <div id="sw-display" class="timer-display">00:00.00</div>
  </section>
  <section class="tool-panel">
    <div class="button-row">
      <button id="btn-sw-start" class="btn">Start</button>
      <button id="btn-sw-pause" class="btn btn-secondary hidden">Pause</button>
      <button id="btn-sw-lap" class="btn btn-secondary" disabled>Lap</button>
      <button id="btn-sw-reset" class="btn btn-secondary">Reset</button>
    </div>
  </section>
  <section class="tool-panel">
    <h3>Laps</h3>
    <div id="sw-laps"></div>
  </section>
</div>
