<div class="tool-header">
  <h2>Merge PDFs</h2>
  <p>Combine PDFs in a clear order. Reorder files before creating the final document.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="drop-zone">
      <input type="file" id="mp-upload" accept="application/pdf" multiple>
      <div>
        <strong>Select PDFs</strong>
        <span>Choose 2 or more PDFs. Use Move Up/Down to set the final order.</span>
      </div>
    </div>
    <div id="mp-file-status" class="selected-file">No PDFs selected yet.</div>
  </section>

  <section id="mp-controls" class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Selected PDFs</span>
        <strong id="mp-count">0</strong>
      </div>
      <div class="metric">
        <span>Total Pages</span>
        <strong id="mp-pages">0</strong>
      </div>
      <div class="metric">
        <span>Output</span>
        <strong>Single PDF</strong>
      </div>
    </div>
    <div style="margin-top:14px;">
      <h3>Merge Order</h3>
      <div id="mp-list" class="file-order-list"></div>
    </div>
    <button id="mp-generate" class="btn">Merge PDFs</button>
  </section>
</div>
