<div class="tool-header">
  <h2>Reading Time Estimator</h2>
  <p>Find out exactly how long it takes to read a piece of text.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="input-group">
      <label for="rt-input">Input Text</label>
      <textarea id="rt-input" class="textarea-tall" placeholder="Type or paste your text here..."></textarea>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric">
      <span>Estimated Reading Time</span>
      <strong id="rt-time">0 min</strong>
    </div>
    <span class="field-hint">Estimate is based on average reading speed.</span>
  </section>
</div>
