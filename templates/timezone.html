<div class="tool-header">
  <h2>Timezone Matcher</h2>
  <p>Convert time easily across different global timezones.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="tz-time">Time</label>
        <input type="time" id="tz-time" value="12:00">
      </div>
      <div class="input-group">
        <label for="tz-from">From Timezone</label>
        <select id="tz-from"></select>
      </div>
      <div class="input-group">
        <label for="tz-to">To Timezone</label>
        <select id="tz-to"></select>
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric">
      <span id="tz-date-offset">Same Day</span>
      <strong id="tz-result">00:00</strong>
    </div>
  </section>
</div>
