<div class="tool-header">
  <h2>Split PDF</h2>
  <p>Extract specific pages from a PDF document.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="drop-zone">
      <input type="file" id="sp-upload" accept="application/pdf">
      <div>
        <strong>Select PDF</strong>
        <span>Extract a custom page range into a new PDF.</span>
      </div>
    </div>
  </section>

  <section id="sp-controls" class="tool-panel">
    <div class="input-group">
      <label>Pages to Extract</label>
      <input type="text" id="sp-pages" placeholder="Example: 1-3, 5, 8-10">
      <span class="field-hint">Use commas for separate pages and hyphens for ranges.</span>
    </div>
    <ul class="option-list">
      <li>Single page: 4</li>
      <li>Range: 2-7</li>
      <li>Mixed: 1, 3, 5-9</li>
    </ul>
    <button id="sp-generate" class="btn">Extract Pages</button>
  </section>
</div>
