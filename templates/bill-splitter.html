<div class="tool-header">
  <h2>Bill Splitter</h2>
  <p>Easily split restaurant bills with tip included.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="bs-amount">Bill Amount</label>
        <input type="number" id="bs-amount" placeholder="e.g. 150.00" min="0" step="0.01">
      </div>
      <div class="input-group">
        <label for="bs-tip">Tip Percentage</label>
        <input type="number" id="bs-tip" placeholder="e.g. 15" min="0" value="15">
      </div>
      <div class="input-group">
        <label for="bs-people">People</label>
        <input type="number" id="bs-people" placeholder="e.g. 3" min="1" value="1">
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Total Tip</span>
        <strong id="bs-total-tip">0.00</strong>
      </div>
      <div class="metric">
        <span>Total With Tip</span>
        <strong id="bs-total-amount">0.00</strong>
      </div>
      <div class="metric">
        <span>Per Person</span>
        <strong id="bs-per-person">0.00</strong>
      </div>
    </div>
  </section>
</div>
