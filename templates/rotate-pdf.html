<div class="tool-header">
  <h2>Rotate PDF</h2>
  <p>Rotate all pages in your PDF document.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="drop-zone">
      <input type="file" id="rp-upload" accept="application/pdf">
      <div>
        <strong>Select PDF</strong>
        <span>Choose a rotation direction after selecting your file.</span>
      </div>
    </div>
  </section>

  <section id="rp-controls" class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Scope</span>
        <strong>All Pages</strong>
      </div>
      <div class="metric">
        <span>Output</span>
        <strong>Rotated PDF</strong>
      </div>
    </div>
    <div class="button-row">
      <button id="rp-left" class="btn btn-secondary">Rotate Left -90°</button>
      <button id="rp-right" class="btn btn-secondary">Rotate Right +90°</button>
    </div>
  </section>
</div>
