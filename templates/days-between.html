<div class="tool-header">
  <h2>Days Between Dates</h2>
  <p>Calculate exactly how much time is between two dates.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="db-start">Start Date</label>
        <input type="date" id="db-start">
      </div>
      <div class="input-group">
        <label for="db-end">End Date</label>
        <input type="date" id="db-end">
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric-grid">
      <div class="metric">
        <span>Total Days</span>
        <strong id="db-days">0</strong>
      </div>
      <div class="metric">
        <span>Weeks</span>
        <strong id="db-weeks">0</strong>
      </div>
      <div class="metric">
        <span>Approx. Months</span>
        <strong id="db-months">0</strong>
      </div>
    </div>
  </section>
</div>
