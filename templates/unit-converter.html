<div class="tool-header">
  <h2>Unit Converter</h2>
  <p>Quickly convert Length, Weight, and Temperature units.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="settings-grid">
      <div class="input-group">
        <label for="uc-category">Category</label>
        <select id="uc-category">
          <option value="length">Length</option>
          <option value="weight">Weight</option>
          <option value="temperature">Temperature</option>
        </select>
      </div>
      <div class="input-group">
        <label for="uc-value">Value</label>
        <input type="number" id="uc-value" placeholder="e.g. 1" value="1">
      </div>
      <div class="input-group">
        <label for="uc-from">From</label>
        <select id="uc-from"></select>
      </div>
      <div class="input-group">
        <label for="uc-to">To</label>
        <select id="uc-to"></select>
      </div>
    </div>
  </section>
  <section class="tool-panel">
    <div class="metric">
      <span>Converted Value</span>
      <strong id="uc-result">0</strong>
    </div>
  </section>
</div>
