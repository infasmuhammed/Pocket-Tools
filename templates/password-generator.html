<div class="tool-header">
  <h2>Password Generator</h2>
  <p>Create strong, secure, random passwords instantly.</p>
</div>
<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="password-output" id="pg-output">Click Generate</div>
    <div class="button-row">
      <button id="btn-pg-generate" class="btn">Generate Password</button>
      <button id="btn-pg-copy" class="btn btn-secondary">Copy Password</button>
    </div>
  </section>
  <section class="tool-panel">
    <div class="input-group">
      <label for="pg-length">Password Length: <span id="pg-length-val">16</span></label>
      <input type="range" id="pg-length" min="8" max="64" value="16">
    </div>
    <div class="checkbox-grid">
      <label><input type="checkbox" id="pg-upper" checked> Uppercase A-Z</label>
      <label><input type="checkbox" id="pg-lower" checked> Lowercase a-z</label>
      <label><input type="checkbox" id="pg-numbers" checked> Numbers 0-9</label>
      <label><input type="checkbox" id="pg-symbols" checked> Symbols</label>
    </div>
  </section>
</div>
