<div class="tool-header">
  <h2>Alphabetical Sorter</h2>
  <p>Sort lines or words in alphabetical order.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="input-group">
      <label for="as-input">List Items</label>
      <textarea id="as-input" placeholder="Apple&#10;Zebra&#10;Banana..."></textarea>
      <span class="field-hint">Use one item per line.</span>
    </div>
    <div class="button-row">
      <button class="btn btn-secondary" id="btn-sort-az">Sort A-Z</button>
      <button class="btn btn-secondary" id="btn-sort-za">Sort Z-A</button>
    </div>
  </section>
  <section class="tool-panel">
    <div class="input-group">
      <label for="as-output">Sorted Result</label>
      <textarea id="as-output" readonly placeholder="Sorted list will appear here..."></textarea>
    </div>
    <button id="as-copy" class="btn">Copy Result</button>
  </section>
</div>
