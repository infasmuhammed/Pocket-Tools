<div class="tool-header">
  <h2>Case Converter</h2>
  <p>Convert text to UPPERCASE, lowercase, Title Case, and more.</p>
</div>

<div class="tool-dashboard">
  <section class="tool-panel">
    <div class="input-group">
      <label for="cc-input">Input Text</label>
      <textarea id="cc-input" placeholder="Type or paste your text here..."></textarea>
    </div>
    <div class="button-row">
      <button class="btn btn-secondary" id="btn-upper">UPPERCASE</button>
      <button class="btn btn-secondary" id="btn-lower">lowercase</button>
      <button class="btn btn-secondary" id="btn-title">Title Case</button>
      <button class="btn btn-secondary" id="btn-sentence">Sentence case</button>
    </div>
  </section>
  <section class="tool-panel">
    <div class="input-group">
      <label for="cc-output">Result</label>
      <textarea id="cc-output" readonly placeholder="Converted text will appear here..."></textarea>
    </div>
    <button id="cc-copy" class="btn">Copy Result</button>
  </section>
</div>
